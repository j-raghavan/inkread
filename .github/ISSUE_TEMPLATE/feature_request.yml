name: 💡 Feature request
description: Propose a new capability or an improvement.
title: "feat: <short summary>"
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the idea! Check the roadmap in `spec/NEOREADER-FEATURE-BACKLOG.md` first — it may
        already be planned. Proposals that respect the architecture (Rust core stays vendor-neutral
        and host-testable) are easiest to land.

  - type: checkboxes
    id: preflight
    attributes:
      label: Preflight
      options:
        - label: I searched existing issues/discussions and this isn't a duplicate.
          required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What can't you do today? Who is affected and when?
      placeholder: "When reading a two-column paper, reflow merges the columns because…"
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What should happen? Sketch the behaviour, not necessarily the implementation.
    validations:
      required: true

  - type: dropdown
    id: layer
    attributes:
      label: Where does this live?
      description: Reminder — the Rust core never names a vendor; device specifics go in the shell.
      options:
        - "Not sure"
        - "Rust core (reader-core / parsing / reflow / ink / refresh policy)"
        - "A support crate (epub / pdftext / dict / lua / ink)"
        - "Android shell / UI / device adapter"
        - "Build / CI / tooling"
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches, prior art (KOReader, NeoReader…), or why the obvious option won't work.
    validations:
      required: false

  - type: checkboxes
    id: help
    attributes:
      label: Contribution
      options:
        - label: I'd be willing to work on this (a maintainer can help scope it).
          required: false
